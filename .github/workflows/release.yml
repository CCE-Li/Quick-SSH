# GitHub Actions: 构建二进制并发布 Quick-SSH
# 触发方式: 推送 tag v* (如 v1.1.0)

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─── 1. 构建二进制（跨平台）──────────────────────────
  build-binaries:
    name: 🏗️ Build binary (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: win-x64
            runner: windows-latest
            suffix: .exe
          - target: linux-x64
            runner: ubuntu-latest
            suffix: ""
          - target: macos-x64
            runner: macos-latest
            suffix: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build binary
        run: node scripts/build.js --platform ${{ matrix.target == 'win-x64' && 'win32' || matrix.target == 'linux-x64' && 'linux' || 'darwin' }}

      - name: Rename binary
        shell: bash
        run: |
          mv dist/qssh-*.exe dist/qssh-${{ matrix.target }}${{ matrix.suffix }} 2>/dev/null || \
          mv dist/qssh-* dist/qssh-${{ matrix.target }}${{ matrix.suffix }} 2>/dev/null || true

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: qssh-${{ matrix.target }}
          path: dist/qssh-${{ matrix.target }}${{ matrix.suffix }}

  # ─── 2. 构建 .deb 包 ──────────────────────────────
  deb-build:
    name: 📦 Build .deb package
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: qssh-linux-x64
          path: packaging/apt/
      - name: Build .deb
        run: |
          chmod +x packaging/apt/qssh-linux-x64
          cd packaging/apt && make deb
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: quick-ssh-deb
          path: packaging/apt/build/*.deb

  # ─── 3. 发布到 npm（可选，保留源码包）────────────
  npm-publish:
    name: 📦 Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── 4. 创建 GitHub Release ─────────────────────
  github-release:
    name: 🚀 Create GitHub Release
    needs: [build-binaries, deb-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Generate release notes
        run: |
          cat > release-notes.md << 'EORELEASE'
          ## Quick-SSH ${{ github.ref_name }}

          ### 🎉 原生二进制版本

          本次发布的 **原生二进制版本** 不再需要 Node.js 运行时！直接下载对应平台的可执行文件即可使用。

          ### 📦 安装方式

          **直接下载二进制（快速上手）：**

          | 平台 | 下载 |
          |------|------|
          | Windows | `qssh-win-x64.exe` |
          | Linux | `qssh-linux-x64` |
          | macOS | `qssh-macos-x64` |

          下载后将文件放入 PATH 目录（如 `/usr/local/bin/`）并重命名为 `qssh` 即可。

          **Scoop (Windows):**
          ```powershell
          scoop bucket add extras
          scoop install quick-ssh
          ```

          **winget (Windows):**
          ```powershell
          winget install CCE-Li.Quick-SSH
          ```

          **apt (Debian/Ubuntu):**
          ```bash
          sudo apt install ./quick-ssh_*.deb
          ```

          **Pacman/AUR (Arch Linux):**
          ```bash
          yay -S quick-ssh
          ```

          **npm (源码安装，需要 Node.js):**
          ```bash
          npm install -g quick-ssh
          ```
          EORELEASE

          echo "" >> release-notes.md
          echo "### 🚀 快速使用" >> release-notes.md
          echo "" >> release-notes.md
          echo '```bash' >> release-notes.md
          echo 'qssh                              # 启动 TUI 界面' >> release-notes.md
          echo 'qssh add my-server root@192.168.1.100:22' >> release-notes.md
          echo 'qssh my-server                    # 一键连接' >> release-notes.md
          echo 'qssh ps                           # 列出所有连接' >> release-notes.md
          echo '```' >> release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            release-artifacts/*
