# 🚀 Quick-SSH Release Pipeline (cargo-dist 风格)
# 自动构建 Rust 二进制 → 归档(.zip/.tar.gz) → GitHub Release
#
# 触发方式: 推送 v* 标签 (如 v2.0.0)

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 构建阶段：为各平台编译二进制 ──────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive-suffix: x86_64-linux
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive-suffix: x86_64-macos
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive-suffix: aarch64-macos
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive-suffix: x86_64-windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install OpenSSL (macOS only)
        if: runner.os == 'macOS'
        run: |
          brew install openssl pkg-config
          echo "OPENSSL_DIR=$(brew --prefix openssl)" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Build qssh (release)
        run: cargo build --release --target ${{ matrix.target }} --package qssh

      - name: Build qssh-uploader (release)
        run: cargo build --release --target ${{ matrix.target }} --package qssh-uploader

      - name: Generate shell completions
        shell: bash
        run: |
          # 生成本地可运行的补全（主机架构）
          cargo run --package qssh -- completions bash > qssh.bash
          cargo run --package qssh -- completions zsh > qssh.zsh
          cargo run --package qssh -- completions fish > qssh.fish
          cargo run --package qssh -- completions powershell > qssh.ps1
          cargo run --package qssh -- completions elvish > qssh.elv

      - name: Prepare archive
        shell: bash
        run: |
          BIN_DIR="target/${{ matrix.target }}/release"

          # 确定二进制文件名（Windows 需要 .exe 后缀）
          if [[ "${{ matrix.target }}" == *-windows-* ]]; then
            QSSH_BIN="qssh.exe"
            UPLOADER_BIN="qssh-uploader.exe"
          else
            QSSH_BIN="qssh"
            UPLOADER_BIN="qssh-uploader"
          fi

          ARCHIVE_DIR="qssh-${{ matrix.archive-suffix }}"
          mkdir -p "$ARCHIVE_DIR"

          cp "$BIN_DIR/$QSSH_BIN" "$ARCHIVE_DIR/"
          cp "$BIN_DIR/$UPLOADER_BIN" "$ARCHIVE_DIR/"
          cp LICENSE "$ARCHIVE_DIR/"
          cp README.md "$ARCHIVE_DIR/"
          cp qssh.*.bash qssh.*.zsh qssh.*.fish qssh.*.ps1 qssh.*.elv "$ARCHIVE_DIR/" 2>/dev/null || true

          # 创建归档
          if [[ "${{ matrix.target }}" == *-windows-* ]]; then
            7z a -tzip "qssh-${{ matrix.archive-suffix }}.zip" "$ARCHIVE_DIR/"
          else
            tar czf "qssh-${{ matrix.archive-suffix }}.tar.gz" "$ARCHIVE_DIR/"
          fi

      - name: Generate checksum
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *-windows-* ]]; then
            sha256sum "qssh-${{ matrix.archive-suffix }}.zip" > "qssh-${{ matrix.archive-suffix }}.zip.sha256"
          else
            sha256sum "qssh-${{ matrix.archive-suffix }}.tar.gz" > "qssh-${{ matrix.archive-suffix }}.tar.gz.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qssh-${{ matrix.archive-suffix }}
          path: |
            qssh-${{ matrix.archive-suffix }}.*
          if-no-files-found: error

  # ── 发布阶段：创建 GitHub Release ─────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          ## 🚀 Quick-SSH v${{ github.ref_name }}

          ### Rust 重构版发布

          此版本使用 Rust 完全重构，提供以下改进：
          - 🎯 原生性能，无 Node.js 依赖
          - 🖥️ TUI 界面（ratatui 驱动）
          - 🔧 完整的 CLI 子命令（ps/add/rm/connect/export/import）
          - 📤 独立文件上传工具（qssh-uploader）
          - 🐚 Shell 补全（bash/zsh/fish/powershell/elvish）

          ### 安装方式

          从下方 **Assets** 下载对应平台的归档文件，解压后即可使用。

          **Scoop (Windows):**
          ```powershell
          scoop bucket add extras
          scoop install quick-ssh
          ```

          **winget (Windows):**
          ```powershell
          winget install CCE-Li.Quick-SSH
          ```

          **Homebrew (macOS):**
          ```bash
          brew install quick-ssh
          ```

          **AUR (Arch Linux):**
          ```bash
          yay -S quick-ssh
          ```

          **APT (Debian/Ubuntu):**
          ```bash
          sudo dpkg -i quick-ssh_*.deb
          ```

          ### 快速使用

          ```bash
          qssh                              # 启动 TUI
          qssh add my-srv root@10.0.0.1     # 添加主机
          qssh my-srv                       # 连接
          qssh ps                           # 列出主机
          qssh help                         # 查看帮助
          ```
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: artifacts/*
          fail_on_unmatched_files: false
